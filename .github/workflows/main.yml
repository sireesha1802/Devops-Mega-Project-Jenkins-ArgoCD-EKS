name: Devops-mega-project

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build Frontend Image
        run: |
          docker build -t sireeshahub1802/frontend:${{ github.run_number }} ./frontend
          docker tag sireeshahub1802/frontend:${{ github.run_number }} sireeshahub1802/frontend:latest

      - name: Build Backend Image
        run: |
          docker build -t sireeshahub1802/backend:${{ github.run_number }} ./backend
          docker tag sireeshahub1802/backend:${{ github.run_number }} sireeshahub1802/backend:latest

      - name: Build database Image
        run: |
          docker build -t sireeshahub1802/mongodb:${{ github.run_number }} ./database
          docker tag sireeshahub1802/mongodb:${{ github.run_number }} sireeshahub1802/mongodb:latest

      - name: Push Frontend Image
        run: |
          docker push sireeshahub1802/frontend:${{ github.run_number }}
          docker push sireeshahub1802/frontend:latest

      - name: Push Backend Image
        run: |
          docker push sireeshahub1802/backend:${{ github.run_number }}
          docker push sireeshahub1802/backend:latest

      - name: Push database Image
        run: |
          docker push sireeshahub1802/mongodb:${{ github.run_number }}
          docker push sireeshahub1802/mongodb:latest
          
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
        
      - name: Configure EKS Access
        run: |
          aws eks update-kubeconfig --name argocd --region us-east-1

      - name: Deploy to EKS
        run: |
          pwd
          sed -i "s|image: .*|image: sireeshahub1802/frontend:latest|g" kubernetes/frontend.yaml
          sed -i "s|image: .*|image: sireeshahub1802/backend:latest|g" kubernetes/backend.yaml
          sed -i "s|image: .*|image: sireeshahub1802/database:latest|g" kubernetes/mongodb.yaml
          kubectl get nodes
          kubectl create namespace wanderlust
          kubectl apply -f kubernetes/frontend.yaml
          kunbectl apply -f kubernetes/backend.yaml
          kubectl apply -f kubernetes/mongodb.yaml
          kubectl apply -f kubernetes/persistentVolume.yaml
          kubectl apply -f kubernetes/persistentVolumeClaim.yaml
          kubectl apply -f kubernetes/redis.yaml
